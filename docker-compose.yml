version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: job-search-postgres
    environment:
      POSTGRES_USER: jobsearch
      POSTGRES_PASSWORD: jobsearch123
      POSTGRES_DB: jobsearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsearch -d jobsearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: job-search-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jobsearch.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-search-nextjs
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://jobsearch:jobsearch123@postgres:5432/jobsearch
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  pgadmin_data:
